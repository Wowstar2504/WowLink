<!DOCTYPE html>
<html>
<head>
    <title>WowLink | Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- <link rel="stylesheet" type="text/css" href="/static/style.css"> -->
</head>
<body>
    <div class="box">
        <h1 style="color: #ff5f57;">WowOS Admin Terminal</h1>
        <nav><a href="/">Home</a> | <a href="/logout">Logout</a></nav>

        <form actuion="/admin" method="POST" style="margin-top: 20px;">
            <input type="text" name="log_content" placeholder="Enter System Log..." required>
            <button type="submit">Post Log</button>
        </form>

        <form action="/admin" method="POST" style="margin-top: 10px;">
            <button class="clearlogsbutton" id="clearlogsbutton" type="submit" name="delete_all">
            Clear All System Logs
            </button>
        </form>

        <hr style="border-color: #30363d; margin: 20px 0;">

        <h3>Recent System Logs</h3>
        <div style="text-align: left;">
            {% for log in logs %}
                <p class="logclass" id="logid">
                    > {{ log[1] }}
                </p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
