name: "🐛 Bug Report"
description: Create a new issue for a bug.
title: "🐛 [BUG] - <title>"
labels: [
    "bug"
]
body:
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: Please eneter an explicit description of your issue.
      placeholder: Short and explicit description of your incident...
    validations:
       required: true
  - type: input
    id: reprod-url
    attributes:
       label: "Reproduction URL"
       description: Pleaseenter your GitHub URL to provide a reproduction of the issue.
       placeholder: Ex. https://github.com/USERNAME/REPO-NAME
    validations:
       required: true
  - type: textarea
    id: reprod
    attributes:
       label: "Reproduction Steps"
       description: Please enter an explicit description of your issue.
       value: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
       render: bash
    validations:
       required: true
  - type: textarea
    id: screenshot
    attributes:
       label: "Screenshots"
       description: If applicable, add screenshots to help explain your problem.
       value: |
          ![DESCRIPTION](LINK.png)
        render: bash
    validations:
       required: true
  - type: textarea
    id: logs
    attributes:
       label: "Logs"
       description: Please cpy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
       render: bash
    validations:
       required: true
  - type: dropdown
    id: browsers
    attributes:
       label: "Browsers"
       description: What browser are you seeing the problem on?
       multiple: true
       options:
        - Firefox
        - Google Chrome
        - Safari
        - Microsoft Edge
        - Opera
        - Other Chromium-based
        - Other
    vaidations:
       required: true
  - type: dropdown
    id: os
    attributes:
       label: "OS"
       description: What Operating System are you using?
       multiple: true
       options:
        - Microsoft Windows
        - Linux
        - Apple iOS
        - Apple macOS
        - Android
        - Other
       validations:
          required: true